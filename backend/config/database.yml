# Database Configuration for AI Factcheck Enterprise
#
# In development and test environments, we use SQLite.
# In production, we use PostgreSQL.

default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: db/development.sqlite3

test:
  <<: *default
  database: db/test.sqlite3

# PostgreSQL is used in production via DATABASE_URL (Railway injects this automatically).
production:
  url: <%= ENV.fetch("DATABASE_URL") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
